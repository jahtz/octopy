[project]
name = "octopy"
version = "7.0.0"
description = "CLI toolkit for layout analysis of historical prints using Kraken"
readme = { file = "README.md", content-type = "text/markdown" }
license = { file = "LICENSE" }
keywords = ["ocr", "layout-analysis", "kraken", "pagexml", "historical-documents"]
authors = [
    { name = "jahtz", email = "jahtz.dev@proton.me" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Scientific/Engineering :: Image Processing",
]
requires-python = ">=3.11,<3.14"
dependencies = [
    "click ~= 8.3.1",
    "kraken >= 6.0.0",
    "pypxml ~= 5.0.0",
    "rich>=14.3.3",
]

#[project.optional-dependencies]
#mod = ["kraken @ git+https://github.com/jahtz/kraken.git"]
#upstream = ["kraken @ git+https://github.com/mittagessen/kraken"]

[project.urls]
Homepage = "https://www.uni-wuerzburg.de/zpd/"
Repository = "https://github.com/jahtz/octopy"
Documentation = "https://github.com/jahtz/octopy#readme"
Issues = "https://github.com/jahtz/octopy/issues"

[project.scripts]
octopy = "octopy.cli:cli_main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
